name: Reputation Tracker

on:
  schedule:
    - cron: '0 8 * * 1'  # Lundi 8h UTC
    - cron: '0 8 * * 3'  # Mercredi 8h UTC
    - cron: '0 8 * * 5'  # Vendredi 8h UTC
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    # NOUVEAU — tourne 2x en parallèle, une fois par modèle
    strategy:
      matrix:
        model: [claude, perplexity]
      fail-fast: false  # si Perplexity échoue, Claude continue quand même

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run tracker (${{ matrix.model }})
        run: python tracker.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}  # NOUVEAU
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          NOTION_DETAILS_DB_ID: ${{ secrets.NOTION_DETAILS_DB_ID }}
          RUN_NUMBER: ${{ github.run_number }}
          MODEL_NAME: ${{ matrix.model }}

  generate-dashboard:
    runs-on: ubuntu-latest
    needs: run-tracker
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv
      - name: Generate dashboard data
        run: python generate_dashboard.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          NOTION_DETAILS_DB_ID: ${{ secrets.NOTION_DETAILS_DB_ID }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
