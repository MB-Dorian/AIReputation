name: Reputation Tracker

on:
  schedule:
    - cron: '0 8 * * 1'  # Lundi 8h UTC
    - cron: '0 8 * * 3'  # Mercredi 8h UTC
    - cron: '0 8 * * 5'  # Vendredi 8h UTC
  workflow_dispatch:      # Lancement manuel possible

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run tracker
        run: python tracker.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_RUNS_DB_ID: ${{ secrets.NOTION_RUNS_DB_ID }}
          NOTION_DETAILS_DB_ID: ${{ secrets.NOTION_DETAILS_DB_ID }}
          RUN_NUMBER: ${{ github.run_number }}
